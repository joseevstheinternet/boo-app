<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>buny! — 홈 화면 가로 스크롤 잔디</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #F0ECE8;
    --surface: #FFFFFF;
    --line: #D4CEC8;
    --line-light: #EAE6E1;
    --text: #1C1916;
    --text-sub: #9B9189;
    --accent: #FF6B8A;
    --accent-light: #FFE8ED;
    --grass-0: #F0ECE8;
    --grass-1: #FFD6E0;
    --grass-2: #FFB3C4;
    --grass-3: #FF8FAB;
    --grass-4: #FF6B8A;
    --grass-5: #E84874;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    padding: 48px 36px 80px;
  }

  .page-header {
    text-align: center;
    margin-bottom: 52px;
  }
  .page-header .eyebrow {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-sub);
    margin-bottom: 10px;
  }
  .page-header h1 { font-size: 24px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
  .page-header p { font-size: 13px; color: var(--text-sub); font-family: 'DM Mono', monospace; }

  .flow-label {
    font-size: 10px; font-weight: 500;
    letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--text-sub); font-family: 'DM Mono', monospace;
    margin-bottom: 28px;
    display: flex; align-items: center; gap: 12px;
  }
  .flow-label::after { content: ''; flex: 1; height: 1px; background: var(--line); }

  .screens-row {
    display: flex;
    gap: 28px;
    align-items: flex-start;
    flex-wrap: wrap;
  }

  .screen-wrap {
    display: flex; flex-direction: column;
    align-items: center; gap: 10px;
    flex-shrink: 0;
  }
  .screen-label {
    font-size: 10px; font-weight: 500;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--text-sub); font-family: 'DM Mono', monospace;
  }
  .screen-sub {
    font-size: 10px; color: var(--line);
    font-family: 'DM Mono', monospace; text-align: center;
  }

  /* Phone */
  .phone {
    width: 375px; height: 812px;
    background: var(--surface);
    border-radius: 44px; overflow: hidden;
    position: relative;
    border: 1.5px solid var(--line);
    box-shadow: 0 24px 64px rgba(0,0,0,0.08);
    display: flex; flex-direction: column;
  }
  .notch {
    position: absolute; top: 0; left: 50%;
    transform: translateX(-50%);
    width: 150px; height: 30px;
    background: var(--surface);
    border-radius: 0 0 20px 20px;
    z-index: 10;
    border-bottom: 1.5px solid var(--line-light);
  }
  .status-bar {
    height: 44px; padding: 14px 28px 0;
    display: flex; justify-content: space-between; align-items: center;
    flex-shrink: 0; position: relative; z-index: 5;
  }
  .time { font-size: 15px; font-weight: 600; color: var(--text); font-family: 'DM Mono', monospace; }

  .screen-content {
    flex: 1; overflow-y: auto; overflow-x: hidden;
    display: flex; flex-direction: column; position: relative;
  }
  .screen-content::-webkit-scrollbar { display: none; }

  .home-bg {
    position: absolute; inset: 0;
    background: linear-gradient(160deg, #FFF5F7 0%, #FFFFFF 50%);
    pointer-events: none;
  }
  .home-inner {
    position: relative; z-index: 1;
    display: flex; flex-direction: column;
    padding-bottom: 16px;
  }

  /* 커플 헤더 */
  .couple-header {
    display: flex; align-items: center;
    padding: 16px 20px 12px;
  }
  .c-avatar {
    width: 44px; height: 44px; border-radius: 50%;
    background: var(--line-light);
    border: 2.5px solid white;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  .couple-meta {
    flex: 1; display: flex; flex-direction: column; align-items: center;
  }
  .couple-since { font-size: 11px; color: var(--text-sub); margin-bottom: 2px; }
  .couple-dday { font-size: 22px; font-weight: 700; color: var(--text); letter-spacing: -0.5px; line-height: 1; margin-bottom: 2px; }
  .couple-names { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text-sub); }
  .couple-heart { color: var(--accent); font-size: 11px; }
  .settings-btn {
    width: 34px; height: 34px; border-radius: 50%;
    background: var(--line-light);
    display: flex; align-items: center; justify-content: center; font-size: 15px;
  }

  /* 대표 사진 */
  .rep-photo {
    margin: 4px 20px 16px;
    border-radius: 18px; overflow: hidden; position: relative;
  }
  .rep-photo-inner {
    width: 100%; height: 180px;
    background: linear-gradient(135deg, #e8e0d8 0%, #d8d0c8 100%);
    display: flex; align-items: center; justify-content: center; font-size: 48px;
  }
  .rep-photo-edit {
    position: absolute; bottom: 10px; right: 10px;
    width: 30px; height: 30px; border-radius: 50%;
    background: rgba(255,255,255,0.85);
    display: flex; align-items: center; justify-content: center; font-size: 13px;
  }

  /* ===== 잔디 섹션 ===== */
  .grass-section {
    margin: 0 20px 16px;
    background: white;
    border-radius: 18px;
    border: 1px solid var(--line-light);
    overflow: hidden;
  }

  .grass-header {
    display: flex; align-items: center;
    justify-content: space-between;
    padding: 14px 16px 10px;
  }
  .grass-title {
    font-size: 13px; font-weight: 600; color: var(--text);
    display: flex; align-items: center; gap: 6px;
  }
  .grass-total { font-size: 11px; color: var(--text-sub); font-family: 'DM Mono', monospace; }

  /* 가로 스크롤 영역 */
  .grass-scroll-area {
    overflow-x: auto;
    overflow-y: hidden;
    padding: 0 16px 12px;
    cursor: grab;
    position: relative;
  }
  .grass-scroll-area::-webkit-scrollbar { display: none; }
  .grass-scroll-area:active { cursor: grabbing; }

  /* 스크롤 페이드 힌트 - 왼쪽에 과거 있음을 암시 */
  .grass-fade-left {
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 32px;
    background: linear-gradient(to right, rgba(255,255,255,0.9), transparent);
    pointer-events: none;
    z-index: 2;
  }

  .grass-inner {
    display: flex;
    flex-direction: column;
    gap: 0;
    /* 전체 너비 = 주수 × (셀크기 + gap) */
    width: max-content;
  }

  /* 월 라벨 행 */
  .month-labels {
    display: flex;
    gap: 0;
    margin-bottom: 4px;
    height: 14px;
  }
  .month-label {
    font-size: 9px; color: var(--text-sub);
    font-family: 'DM Mono', monospace;
    white-space: nowrap;
  }

  /* 그리드 */
  .grass-grid {
    display: flex;
    gap: 3px;
  }
  .grass-col {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .grass-cell {
    width: 14px; height: 14px;
    border-radius: 3px;
    flex-shrink: 0;
    transition: transform 0.1s;
    cursor: pointer;
    position: relative;
  }
  .grass-cell:hover { transform: scale(1.3); z-index: 10; }

  .g0 { background: var(--grass-0); border: 1px solid var(--line-light); }
  .g1 { background: var(--grass-1); }
  .g2 { background: var(--grass-2); }
  .g3 { background: var(--grass-3); }
  .g4 { background: var(--grass-4); }
  .g5 { background: var(--grass-5); }

  /* 오늘 표시 */
  .grass-cell.today {
    outline: 2px solid var(--accent);
    outline-offset: 1px;
  }

  /* 범례 + 툴팁 */
  .grass-footer {
    padding: 0 16px 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .grass-legend {
    display: flex; align-items: center;
    justify-content: flex-end; gap: 4px;
  }
  .legend-label { font-size: 9px; color: var(--text-sub); font-family: 'DM Mono', monospace; }
  .legend-cell { width: 11px; height: 11px; border-radius: 2px; }

  .grass-tooltip {
    background: var(--line-light);
    border-radius: 10px; padding: 8px 12px;
    font-size: 12px; color: var(--text);
    display: flex; align-items: center; gap: 6px;
  }
  .tooltip-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--grass-4); flex-shrink: 0;
  }

  /* 스크롤 힌트 화살표 */
  .scroll-hint {
    display: flex; align-items: center; gap: 4px;
    justify-content: center;
    padding: 0 16px 10px;
  }
  .scroll-hint-text {
    font-size: 10px; color: var(--text-sub);
    font-family: 'DM Mono', monospace;
  }
  .scroll-arrow { font-size: 10px; color: var(--text-sub); }

  /* 기념일 */
  .ann-section { padding: 0 20px; }
  .section-head {
    display: flex; align-items: center;
    justify-content: space-between; margin-bottom: 10px;
  }
  .section-title {
    font-size: 11px; font-weight: 500;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--text-sub); font-family: 'DM Mono', monospace;
  }
  .section-add { font-size: 20px; color: var(--text-sub); }
  .ann-list { display: flex; flex-direction: column; gap: 8px; }
  .ann-item {
    display: flex; align-items: center;
    justify-content: space-between;
    padding: 12px 14px; background: white;
    border-radius: 14px; border: 1px solid var(--line-light);
  }
  .ann-left { display: flex; align-items: center; gap: 10px; }
  .ann-icon {
    width: 34px; height: 34px; border-radius: 10px;
    background: var(--accent-light);
    display: flex; align-items: center; justify-content: center; font-size: 16px;
  }
  .ann-name { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 1px; }
  .ann-date { font-size: 11px; color: var(--text-sub); font-family: 'DM Mono', monospace; }
  .ann-badge { font-size: 12px; font-weight: 600; color: var(--accent); font-family: 'DM Mono', monospace; }

  /* 탭바 */
  .tab-bar {
    height: 82px; border-top: 1px solid var(--line-light);
    display: flex; align-items: flex-start; padding-top: 10px;
    flex-shrink: 0; background: white;
  }
  .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .tab-icon {
    width: 28px; height: 28px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center; font-size: 18px;
  }
  .tab-item.active .tab-icon { background: var(--accent-light); }
  .tab-text { font-size: 10px; font-weight: 500; color: var(--text-sub); font-family: 'DM Mono', monospace; }
  .tab-item.active .tab-text { color: var(--accent); }

  /* Scale */
  @media (max-width: 1400px) {
    .phone { transform: scale(0.78); transform-origin: top center; margin-bottom: -179px; }
  }
  @media (max-width: 1100px) {
    .phone { transform: scale(0.65); transform-origin: top center; margin-bottom: -284px; }
  }
</style>
</head>
<body>

<div class="page-header">
  <div class="eyebrow">buny! — 홈 화면</div>
  <h1>대화 잔디 — 가로 스크롤 🌱</h1>
  <p>연애 시작일부터 오늘까지 전체 · 375 × 812</p>
</div>

<div class="flow-label">홈 화면 · 가로 스크롤 잔디</div>

<div class="screens-row">

  <div class="screen-wrap">
    <div class="phone">
      <div class="notch"></div>
      <div class="status-bar"><span class="time">9:41</span></div>

      <div class="screen-content">
        <div class="home-bg"></div>
        <div class="home-inner">

          <!-- 커플 헤더 -->
          <div class="couple-header">
            <div class="c-avatar">🐱</div>
            <div class="couple-meta">
              <div class="couple-since">연애한 지</div>
              <div class="couple-dday">365일</div>
              <div class="couple-names">Cat <span class="couple-heart">♥</span> buny</div>
            </div>
            <div class="c-avatar">🐶</div>
          </div>

          <!-- 대표 사진 -->
          <div class="rep-photo">
            <div class="rep-photo-inner">🐾</div>
            <div class="rep-photo-edit">✏️</div>
          </div>

          <!-- 잔디 섹션 -->
          <div class="grass-section">
            <div class="grass-header">
              <div class="grass-title">🌱 우리의 대화</div>
              <div class="grass-total">총 12,847개</div>
            </div>

            <!-- 가로 스크롤 영역 -->
            <div class="grass-scroll-area" id="scrollArea">
              <div class="grass-fade-left"></div>
              <div class="grass-inner">
                <!-- 월 라벨 -->
                <div class="month-labels" id="monthLabels"></div>
                <!-- 그리드 -->
                <div class="grass-grid" id="grassGrid"></div>
              </div>
            </div>

            <!-- 스크롤 힌트 -->
            <div class="scroll-hint">
              <div class="scroll-arrow">←</div>
              <div class="scroll-hint-text">스크롤하면 처음부터 볼 수 있어요</div>
              <div class="scroll-arrow">→</div>
            </div>

            <!-- 범례 + 툴팁 -->
            <div class="grass-footer">
              <div class="grass-legend">
                <div class="legend-label">적음</div>
                <div class="legend-cell" style="background:var(--grass-0); border:1px solid var(--line-light);"></div>
                <div class="legend-cell" style="background:var(--grass-1);"></div>
                <div class="legend-cell" style="background:var(--grass-2);"></div>
                <div class="legend-cell" style="background:var(--grass-3);"></div>
                <div class="legend-cell" style="background:var(--grass-4);"></div>
                <div class="legend-cell" style="background:var(--grass-5);"></div>
                <div class="legend-label">많음</div>
              </div>
              <div class="grass-tooltip" id="tooltip">
                <div class="tooltip-dot"></div>
                <span id="tooltipText">날짜를 탭하면 대화 수를 볼 수 있어요</span>
              </div>
            </div>
          </div>

          <!-- 기념일 -->
          <div class="ann-section">
            <div class="section-head">
              <div class="section-title">기념일</div>
              <div class="section-add">+</div>
            </div>
            <div class="ann-list">
              <div class="ann-item">
                <div class="ann-left">
                  <div class="ann-icon">💑</div>
                  <div>
                    <div class="ann-name">처음 만난 날</div>
                    <div class="ann-date">03.19</div>
                  </div>
                </div>
                <div class="ann-badge">D+365</div>
              </div>
              <div class="ann-item">
                <div class="ann-left">
                  <div class="ann-icon">🎂</div>
                  <div>
                    <div class="ann-name">내 생일</div>
                    <div class="ann-date">07.12</div>
                  </div>
                </div>
                <div class="ann-badge">D-115</div>
              </div>
            </div>
          </div>

        </div>
      </div>

      <div class="tab-bar">
        <div class="tab-item active"><div class="tab-icon">🏠</div><span class="tab-text">홈</span></div>
        <div class="tab-item"><div class="tab-icon">💬</div><span class="tab-text">채팅</span></div>
        <div class="tab-item"><div class="tab-icon">👫</div><span class="tab-text">우리</span></div>
      </div>
    </div>
    <span class="screen-label">홈 · 가로 스크롤 잔디</span>
    <span class="screen-sub">← 스크롤하면 연애 첫날부터 보임</span>
  </div>

</div>

<script>
  const TOTAL_WEEKS = 52  // 1년치
  const DAYS = TOTAL_WEEKS * 7
  const CELL = 14
  const GAP = 3

  // 날짜 데이터 생성
  const today = new Date()
  const startDate = new Date(today)
  startDate.setDate(today.getDate() - DAYS + 1)

  // 메시지 수 랜덤 생성 (현실적인 패턴)
  const counts = Array.from({ length: DAYS }, (_, i) => {
    const weekday = (new Date(startDate.getTime() + i * 86400000)).getDay()
    const isWeekend = weekday === 0 || weekday === 6
    const base = isWeekend ? 0.7 : 0.45
    const rand = Math.random()
    if (rand < 0.08) return 0
    if (rand < base - 0.1) return Math.floor(Math.random() * 99) + 1
    if (rand < base + 0.1) return Math.floor(Math.random() * 200) + 100
    if (rand < base + 0.25) return Math.floor(Math.random() * 200) + 300
    if (rand < base + 0.38) return Math.floor(Math.random() * 500) + 500
    return Math.floor(Math.random() * 500) + 1000
  })

  const getLevel = (count) => {
    if (count === 0) return 0
    if (count < 100) return 1
    if (count < 300) return 2
    if (count < 500) return 3
    if (count < 1000) return 4
    return 5
  }

  const getCountLabel = (count) => {
    if (count === 0) return '대화 없음'
    if (count < 100) return `${count}개 · 짧게 나눴어요`
    if (count < 300) return `${count}개 · 꽤 많이 했네요 😊`
    if (count < 500) return `${count}개 · 수다쟁이들 💬`
    if (count < 1000) return `${count}개 · 종일 붙어있었네요 💕`
    return `${count}개 · 오늘 뭔 일 있었어요? 🔥`
  }

  // 월 라벨 생성
  const monthLabels = document.getElementById('monthLabels')
  const monthNames = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월']
  let lastMonth = -1
  for (let w = 0; w < TOTAL_WEEKS; w++) {
    const d = new Date(startDate.getTime() + w * 7 * 86400000)
    const month = d.getMonth()
    const label = document.createElement('div')
    label.className = 'month-label'
    label.style.width = `${CELL + GAP}px`
    label.style.flexShrink = '0'
    if (month !== lastMonth) {
      label.textContent = monthNames[month]
      lastMonth = month
    }
    monthLabels.appendChild(label)
  }

  // 그리드 생성 (열 = 주, 행 = 요일)
  const grid = document.getElementById('grassGrid')
  const tooltipText = document.getElementById('tooltipText')
  const tooltipDot = document.querySelector('.tooltip-dot')

  for (let w = 0; w < TOTAL_WEEKS; w++) {
    const col = document.createElement('div')
    col.className = 'grass-col'

    for (let d = 0; d < 7; d++) {
      const dayIndex = w * 7 + d
      const count = counts[dayIndex]
      const level = getLevel(count)
      const date = new Date(startDate.getTime() + dayIndex * 86400000)
      const isToday = dayIndex === DAYS - 1

      const cell = document.createElement('div')
      cell.className = `grass-cell g${level}${isToday ? ' today' : ''}`

      cell.addEventListener('click', () => {
        const m = date.getMonth() + 1
        const dd = date.getDate()
        tooltipText.textContent = `${m}월 ${dd}일 · ${getCountLabel(count)}`
        tooltipDot.style.background = `var(--grass-${level})`
        if (level === 0) tooltipDot.style.border = '1px solid var(--line)'
        else tooltipDot.style.border = 'none'
      })

      col.appendChild(cell)
    }
    grid.appendChild(col)
  }

  // 맨 오른쪽(오늘)으로 스크롤
  const scrollArea = document.getElementById('scrollArea')
  scrollArea.scrollLeft = scrollArea.scrollWidth

  // 드래그 스크롤
  let isDown = false, startX, scrollLeft
  scrollArea.addEventListener('mousedown', e => {
    isDown = true
    startX = e.pageX - scrollArea.offsetLeft
    scrollLeft = scrollArea.scrollLeft
  })
  scrollArea.addEventListener('mouseleave', () => isDown = false)
  scrollArea.addEventListener('mouseup', () => isDown = false)
  scrollArea.addEventListener('mousemove', e => {
    if (!isDown) return
    e.preventDefault()
    const x = e.pageX - scrollArea.offsetLeft
    scrollArea.scrollLeft = scrollLeft - (x - startX)
  })
</script>

</body>
</html>
